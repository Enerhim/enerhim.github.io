baseURL = 'https://enerhim.github.io'
languageCode = 'en-us'
title = "Himanshu Sharma's Blog"
theme = "minimal-black"

# Enable search index generation and web app manifest
[outputs]
  home = ["HTML", "RSS", "JSON", "WebAppManifest"]

[outputFormats.WebAppManifest]
  mediaType = "application/manifest+json"
  rel = "manifest"
  baseName = "manifest"
  isPlainText = true
  notAlternative = true

[params]
  brand = " "
  description = "A blog containing my notes, projects and such"

  # Favicon - Place your favicon files in /static/ directory
  # Supported formats: .ico, .png, .svg
  favicon = "images/profile.jpg"
  appleTouchIcon = "apple-touch-icon.png"

  # Logo (optional)
  logo = "images/profile.jpg"

  # Project and blog intro text
  projectsIntro = "Selected projects to display list." # Can be empty
  blogIntro = "" # Can be empty

  # Web App Manifest Configuration (PWA support)
  [params.manifest]
    themeColor = "#a855f7"
    backgroundColor = "#000000"
    categories = ["blog", "portfolio", "developer"]

    # Custom icon configuration (optional)
    # If not specified, defaults to /icons/android-chrome-*.png
    # [[params.manifest.icons]]
    #   src = "/icons/android-chrome-192x192.png"
    #   sizes = "192x192"
    #   type = "image/png"
    #   purpose = "any maskable"

  # Theme Configuration
  [params.theme]
    defaultTheme = "dark"  # Options: "light", "dark", "system"

  # Home Page Configuration
  [params.home]
    sections = ["hero", "now", "projects", "posts"]
    # sections = ["hero", "now", "tech-marquee", "projects", "posts"]
    showNowSection = false
    showFeaturedProjects = true
    showLatestPosts = true
    featuredProjectsLimit = 3
    latestPostsLimit = 3
    projectsTitle = "Some Work"
    projectsSubtitle = ""
    blogTitle = "Latest Writing"
    blogSubtitle = ""
    techMarqueeLabel = "Experienced In"

    # Technology Stack Display
    [[params.home.tech]]
      label = "Python"
      icon = "devicon-python-plain"

    [[params.home.tech]]
      label = "NextJs"
      icon = "devicon-nextjs-plain"  

    [[params.home.tech]]
      label = "Arch"
      icon = "devicon-archlinux-plain"

    [[params.home.techReverse]]
      label = "Git"
      icon = "devicon-git-plain"

    [[params.home.techReverse]]
      label = "Hugo"
      icon = "devicon-hugo-plain"  

  # Hero Section Configuration
  [params.hero]
    badge = "Software Engineer"
    title = "Himanshu Sharma"
#    role = "Subtitle for title with role perspective"
#    summary = "You can write your summary to be displayed here."
    # avatar = "images/avatar.jpg"  # Optional: 400x400px recommended
    location = "Vadodara / India"
    focus = "MLOps"
    available = true
    availableLabel = "Available for work"

    nowLabel = "Quick Facts"
    nowIntro = "Right now I'm mainly:"
    now = [
      "Building minimal Hugo themes",
      "Exploring dark-mode design patterns",
      "Writing about web performance"
    ]

    [params.hero.primary]
      label = "View Projects"
      href = "/projects/"

    [params.hero.secondary]
      label = "Read the Blog"
      href = "/blog/"

  # Icon Libraries
  [params.icons]
    useFontAwesome = true
    useDevicon = true

  # Social Links
  [[params.social]]
    label = "GitHub"
    url = "https://github.com/Enerhim"
    icon = "fa-brands fa-github"

  [[params.social]]
    label = "LinkedIn"
    url = "https://www.linkedin.com/in/enerhim"
    icon = "fa-brands fa-linkedin-in"

  [[params.social]]
    label = "Email"
    url = "himsharma.contact@gmail.com"
    icon = "fa-regular fa-envelope"

  # Analytics Configuration
  [params.analytics]
    # Google Analytics (GA4)
    # googleAnalytics = "G-XXXXXXXXXX"

    # Plausible Analytics (privacy-friendly)
    # [params.analytics.plausible]
    #   enabled = true
    #   domain = "yourdomain.com"
    #   scriptUrl = "https://plausible.io/js/script.js"

    # Umami Analytics (self-hosted option)
    # [params.analytics.umami]
    #   enabled = true
    #   scriptUrl = "https://analytics.yourdomain.com/script.js"
    #   websiteId = "your-website-id"

    # Fathom Analytics
    # [params.analytics.fathom]
    #   enabled = true
    #   scriptUrl = "https://cdn.usefathom.com/script.js"
    #   siteId = "YOUR-SITE-ID"

# Navigation Menu
[menu]
  [[menu.main]]
    name = "Home"
    pageRef = "/"
    url = "/"
    weight = 1
    identifier = "home"
    [menu.main.params]
      icon = "fa-solid fa-house"

  # [[menu.main]]
  #   name = "About"
  #   pageRef = "about"
  #   url = "/about/"
  #   weight = 2
  #   identifier = "about"
  #   [menu.main.params]
  #     icon = "fa-regular fa-user"
  #
  # [[menu.main]]
  #   name = "About Alt"
  #   pageRef = "about-alternative"
  #   url = "/about-alternative/"
  #   weight = 2
  #   identifier = "about-alternative"
  #   [menu.main.params]
  #     icon = "fa-solid fa-user"

  [[menu.main]]
    name = "Projects"
    pageRef = "projects"
    url = "/projects/"
    weight = 3
    identifier = "projects"
    [menu.main.params]
      icon = "fa-regular fa-folder-open"

  [[menu.main]]
    name = "Blog"
    pageRef = "blog"
    url = "/blog/"
    weight = 4
    identifier = "blog"
    [menu.main.params]
      icon = "fa-regular fa-note-sticky"

# Markup Configuration
[markup]
  # Table of Contents
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

  # Goldmark Renderer (Markdown)
  [markup.goldmark.renderer]
    unsafe = true

  [markup.goldmark.parser]
      [markup.goldmark.parser.attribute]
        block = true

  [markup.goldmark.extensions]
    typographer = true
    linkify = true
    table = true
    strikethrough = true
    taskList = true
    definitionList = true
    footnote = true

    [markup.goldmark.extensions.extras.delete]
      enable = true
    [markup.goldmark.extensions.extras.insert]
      enable = true
    [markup.goldmark.extensions.extras.mark]
      enable = true
    [markup.goldmark.extensions.passthrough]
      enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [["$$","$$"]]
      inline = [["$","$"]]

  # Syntax Highlighting
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = false
    lineNumbersInTable = false
    noClasses = false
    style = "monokai"
    tabWidth = 2

# Taxonomies
[taxonomies]
  tag = "tags"
  category = "categories"

# Privacy Configuration
[privacy]
  [privacy.youtube]
    privacyEnhanced = true

[caches]
  [caches.images]
    dir = ':cacheDir/images'
